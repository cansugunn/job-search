server.port=8080
spring.application.name=job-search
server.servlet.context-path=/job-search

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# MongoDB
spring.data.mongodb.uri=${MONGO_URI}

# Redis
spring.data.redis.url=${REDIS_URL}

# OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256

# RabbitMQ
spring.rabbitmq.addresses=${RABBITMQ_URL}
job-search.rabbitmq.queue=new-job-postings
job-search.rabbitmq.exchange=job-search-exchange
job-search.rabbitmq.routing-key=new-posting

# Redis cache TTL (seconds)
job-search.cache.job-posting.ttl=600

# Logging
logging.level.com.jobsearch=INFO
